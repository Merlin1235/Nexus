<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login • Nexus</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<script>

tailwind.config = {

theme: {

extend: {

fontFamily: {

sans: ['Inter','sans-serif']

},

colors: {

primary:'#2563EB',

dark:'#0F172A',

card:'#1E293B'

}

}

}

}

</script>

<body class="bg-dark font-sans text-white">

    <main class="min-h-screen flex items-center justify-center px-6 py-10">
       <div class="w-full max-w-6xl bg-card rounded-3xl shadow-2xl overflow-hidden">

    <div class="grid lg:grid-cols-2">

    <!-- Left Branding Panel -->
    <div class="hidden lg:flex flex-col justify-center bg-gradient-to-br from-primary via-blue-700 to-indigo-900 p-12 text-white relative overflow-hidden">

        <!-- Background Glow -->
        <div class="absolute -top-20 -left-20 w-72 h-72 bg-white/10 rounded-full blur-3xl"></div>

        <div class="absolute bottom-0 right-0 w-64 h-64 bg-blue-300/10 rounded-full blur-3xl"></div>

        <!-- Logo -->
        <img
            src="https://raw.githubusercontent.com/Merlin1235/Nexus/main/Logo.png"
            alt="Nexus Logo"
            class="w-24 mb-8">

        <!-- Title -->
        <h1 class="text-5xl font-extrabold">

            Welcome
            <br>
            Back.

        </h1>

        <!-- Description -->
        <p class="mt-6 text-blue-100 leading-8 text-lg">

            Continue building smarter with AI,
            Blockchain, Cloud Computing and modern
            developer tools.

        </p>

        <!-- Tags -->
        <div class="flex flex-wrap gap-3 mt-10">

            <span class="bg-white/10 px-4 py-2 rounded-full">
                🤖 AI
            </span>

            <span class="bg-white/10 px-4 py-2 rounded-full">
                ⛓ Blockchain
            </span>

            <span class="bg-white/10 px-4 py-2 rounded-full">
                ☁ Cloud
            </span>

        </div>

        </div>


<!-- LEFT -->
<div class="p-8 md:p-12 flex items-center">

    <div class="w-full max-w-md mx-auto">

        <span class="text-primary font-semibold">
            Welcome Back 👋
        </span>

        <h2 class="text-4xl font-bold mt-3">
            Sign in to Nexus
        </h2>

        <p class="text-gray-400 mt-3">
            Continue building amazing software.
        </p>

<div class="mt-8">

    <label class="block text-sm font-medium text-gray-300 mb-2">
        Email Address
    </label>

    <input
        type="email"
        placeholder="Enter your email"
        class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 focus:border-primary focus:outline-none transition">

</div>

        <div class="mt-5">

    <label class="block text-sm font-medium text-gray-300 mb-2">
        Password
    </label>

    <input
        type="password"
        placeholder="Enter your password"
        class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 focus:border-primary focus:outline-none transition">

</div>

        <div class="flex justify-between items-center mt-5">

    <label class="flex items-center space-x-2 text-gray-400">

        <input type="checkbox">

        <span>Remember me</span>

    </label>

    <a href="forgot.html"
       class="text-primary hover:underline">

        Forgot Password?

    </a>

</div>

        <button
class="w-full mt-8 bg-primary hover:bg-blue-700 py-3 rounded-xl font-semibold transition">

    Sign In

</button>
        <p class="text-center text-gray-400 mt-6">

    Don't have an account?

    <a href="register.html"
       class="text-primary hover:underline">

        Register

    </a>

</p>

    </div>

</div>
</div>

</div>

    </main>

</body>

</html>
